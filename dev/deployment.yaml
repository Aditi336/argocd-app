apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-deployment
spec:
  selector:
    matchLabels:
      app: argocd-deployment
  replica: 2
  template:
    metadata:
      labels:
        app: argocd-deployment   
    spec:
      containers:
      - name: argocd-deployment
        image: nanajanashia/argocd-app:1.0
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 8080
